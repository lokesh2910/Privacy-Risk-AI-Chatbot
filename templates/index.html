<!DOCTYPE html>
<html>

<head>

<title>Privacy Risk AI Chatbot</title>

<link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">

</head>

<body>

<div class="container">

<h2>🤖 Privacy Risk AI Chatbot</h2>

<div id="chat-box">

{% for msg in chat_history %}

{% if msg.role == "user" %}
<div class="user">You: {{ msg.content }}</div>
{% endif %}

{% if msg.role == "bot" %}
<div class="bot">Bot: {{ msg.content }}</div>
{% endif %}

{% endfor %}

{% if warning %}
<div class="warning">⚠ {{ warning }}</div>
{% endif %}

</div>

<form method="POST">

<input type="text" name="message" placeholder="Type your message..." required>

<button type="submit">Send</button>

</form>

</div>


<script>
const chatBox = document.getElementById("chat-box");
chatBox.scrollTop = chatBox.scrollHeight;
</script>

</body>

</html>
